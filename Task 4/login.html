<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: Arial;
    background: #f4f4f4;
}
.container {
    width: 80%;
    margin: auto;
}
h2 {
    text-align: center;
}
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}
th, td {
    padding: 10px;
    border: 1px solid #ddd;
    text-align: center;
}
th {
    background: #007BFF;
    color: white;
}
</style>
</head>

<body>

<div class="container">
    <h2>Customer Order History</h2>
    <table>
        <tr>
            <th>Name</th>
            <th>Product</th>
            <th>Quantity</th>
            <th>Total Price</th>
            <th>Date</th>
        </tr>

        <!-- Dynamic data comes here using PHP -->
    </table>
</div>

</body>
</html>
